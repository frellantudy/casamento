<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário&Élida</title>
    <link rel="stylesheet" href="style.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap');
</style>
</head>
<body>
    <div class="conteudo">
    <header> 
        <img src="img/casal.jpeg" alt="retrato do casal">
    </header>
    
    <main>
        <h1 class="dancing">Mário & Élida</h1>
        <h2 class="soul">Bem-vindos ao nosso pra sempre!</h2>
    </main>
        <!-- From Uiverse.io by Tsiangana --> 
    <div class="card">
  <div class="one">
    <span class="title">Ouça Nossa Trilha!</span>
    <div class="music">
      <svg
        viewBox="0 0 16 16"
        class="note bi bi-music-note"
        fill="currentColor"
        height="18"
        width="18"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M9 13c0 1.105-1.12 2-2.5 2S4 14.105 4 13s1.12-2 2.5-2 2.5.895 2.5 2z"
        ></path>
        <path d="M9 3v10H8V3h1z" fill-rule="evenodd"></path>
        <path
          d="M8 2.82a1 1 0 0 1 .804-.98l3-.6A1 1 0 0 1 13 2.22V4L8 5V2.82z"
        ></path>
      </svg>
    </div>
    <span class="name"
      ><div></div>
      Para Ti Eu Vou</span
    >
    <span class="name1"
      ><div></div></span
    >
    <div class="bar">
      <svg
        viewBox="0 0 16 16"
        class="color bi bi-fast-forward-fill"
        fill="currentColor"
        height="16"
        width="16"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M7.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C.713 12.69 0 12.345 0 11.692V4.308c0-.653.713-.998 1.233-.696l6.363 3.692Z"
        ></path>
        <path
          d="M15.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C8.713 12.69 8 12.345 8 11.692V4.308c0-.653.713-.998 1.233-.696l6.363 3.692Z"
        ></path>
      </svg>
      <svg
        viewBox="0 0 16 16"
        class="color bi bi-caret-right-fill"
        fill="currentColor"
        height="18"
        width="18"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="m12.14 8.753-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z"
        ></path>
      </svg>
      <svg
        viewBox="0 0 16 16"
        class="color bi bi-fast-forward-fill"
        fill="currentColor"
        height="16"
        width="16"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M7.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C.713 12.69 0 12.345 0 11.692V4.308c0-.653.713-.998 1.233-.696l6.363 3.692Z"
        ></path>
        <path
          d="M15.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C8.713 12.69 8 12.345 8 11.692V4.308c0-.653.713-.998 1.233-.696l6.363 3.692Z"
        ></path>
      </svg>
    </div>
    <!-- segunda .bar removida -->
  </div>
  <!-- luzes animadas removidas -->
</div>
    <div class="versiculo">
      <h2 class="dancing">"Quando for a hora certa, eu, O Senhor, farei acontecer" Isaías 60:22</h2>
    </div>

    <div class="anuncio">
        <h1 class="dancing">Save the Date!</h1>
        <h2 class="soul">12/09/2026</h2>
    </div>

    <!--peguei do github contador de tempo-->
    <div id="contador">
  <div class="tempo-bloco">
    <span class="tempo-label">Dias</span>
    <span id="dias" class="tempo-valor">0</span>
  </div>
  <div class="tempo-bloco">
    <span class="tempo-label">Horas</span>
    <span id="horas" class="tempo-valor">0</span>
  </div>
  <div class="tempo-bloco">
    <span class="tempo-label">Minutos</span>
    <span id="minutos" class="tempo-valor">0</span>
  </div>
  <div class="tempo-bloco">
    <span class="tempo-label">Segundos</span>
    <span id="segundos" class="tempo-valor">0</span>
  </div>
</div>




    <footer>
      <h3 class="soul">Clique nos Botões:</h3>
      <div class="caminhos">
        <a href=""><button style="cursor: pointer;">Lista de Presença</button></a>
        <a href=""><button style="cursor: pointer;">Endereço</button></a>
        <a href=""><button style="cursor: pointer;">Presentes</button></a>
      </div>
    </footer>
    </div>
    <audio controls>
  <source src="Para Ti Eu Vou - Central 3  VERSÃO FÁCIL  Piano e Teclado Tutorial - Piano e Teclado Tutorial (youtube).mp3" type="audio/mpeg">

</audio>

    <script src="script.js"></script>
</body>
</html>
